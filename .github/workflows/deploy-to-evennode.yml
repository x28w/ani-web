name: Deploy to EvenNode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_NAME }}"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan git.evennode.com >> ~/.ssh/known_hosts

      - name: Build app for EvenNode
        run: |
          npm install
          npm run setup
          npm run build
          git add -f server/dist client/dist
          git status
          git commit -m "Build app for EvenNode" || echo "No build changes"

      - name: Push to EvenNode
        run: |
          git remote add evennode "${{ secrets.EVENNODE_REPO_URL }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" git push evennode HEAD:master --force
